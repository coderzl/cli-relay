workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Get packages
        script: flutter packages pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - dev@example.com
        notify:
          success: true
          failure: true

workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: app

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Generate Android project files
        script: |
          # Flutter 项目手写的，需要生成 android/ 目录
          flutter create --platforms android --org com.coderzl .
          flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - coderzl@163.com
        notify:
          success: true
          failure: true
